    <div class="post-content"><!doctype html>
<html>
    <head>
        <script src="/path/to/p5.min.js"></script>
    </head>
    <body>
        <script>
            new p5(function (p) {
                var img;
                p.preload = function () {
                    console.log("preload called");
                    img = p.loadImage(
                        "http://localhost:1313/projects/iss_tracker/assets/Blue_Marble_2002.png",
                        function () {
                            console.log("loaded");
                        },
                        function (e) {
                            console.log("failed:", e);
                        },
                    );
                };
                p.setup = function () {
                    console.log("setup, img:", img);
                    p.createCanvas(400, 400);
                };
                p.draw = function () {
                    p.background(0);
                    if (img) p.image(img, 0, 0);
                };
            });
        </script>
    </body>
</html>
